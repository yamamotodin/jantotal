name: Deploy to S3 / CloudFront

on:
  push:
    branches:
      - main

permissions:
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /jantotal/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync build/web/ s3://${{ secrets.AWS_S3_BUCKET_NAME }}/jantotal/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "flutter_service_worker.js"
          # index.html と SW はキャッシュさせない（/jantotal/ 配下に配置）
          aws s3 cp build/web/index.html s3://${{ secrets.AWS_S3_BUCKET_NAME }}/jantotal/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 cp build/web/flutter_service_worker.js s3://${{ secrets.AWS_S3_BUCKET_NAME }}/jantotal/flutter_service_worker.js \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache 1
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/jantotal/*"

      - name: Invalidate CloudFront cache 2
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID_2 }} \
            --paths "/jantotal/*"
